name: swift_field
description: "Production-grade Flutter form widgets: text fields, password fields, searchable dropdowns, and gradient buttons. Zero dependencies."
version: 0.2.0
homepage: https://github.com/spatelpatidar/swift_field
repository: https://github.com/spatelpatidar/swift_field
issue_tracker: https://github.com/spatelpatidar/swift_field/issues

topics:
  - text-field
  - dropdown
  - button
  - dropdown-search
  - widgets

screenshots:
  - description: 'Button and Icon: All Button have two type icon with button and Simple Button'
    path: screenshots/button_with_icon.png
  - description: 'Dropdown: Dropdown without other package dependency'
    path: screenshots/dropdown.png
  - description: 'Dropdown Search: Dynamic Search on Dropdown'
    path: screenshots/dropdown_search.png
  - description: 'Button with Gradient: Both Button support Gradient'
    path: screenshots/button_gradiant.png


environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter: